<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--=============== FAVICON ===============-->
    <link rel="shortcut icon" href="assets/img/favicon.png" type="image/x-icon">

    <!--=============== REMIX ICONS ===============-->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">

    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/chatbot.css">

    <title>Farmer AI Chatbot - PLANT GROWING GUIDE</title>
</head>
<body class="dark-theme">
    <div class="chat-app">
        <!-- Top Navigation -->
        <header class="chat-header">
            <a href="index.html" class="chat-back"><i class="ri-arrow-left-s-line"></i> Home</a>
            <span class="chat-title">Farmer AI <i class="ri-leaf-line"></i></span>
            <i class="ri-sun-line change-theme" id="theme-button" style="cursor: pointer;"></i>
        </header>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <div class="chat-messages-container">
                <div class="chat-messages" id="chatMessages">
                    <!-- Messages will be injected here -->
                </div>
            </div>
            
            <!-- Input Area -->
            <div class="chat-input-container">
                <form class="chat-form" id="chatForm">
                    <div class="chat-input-wrapper">
                        <input type="text" id="chatInput" placeholder="Message Farmer AI..." autocomplete="off">
                        <button type="submit" class="chat-send">
                            <i class="ri-arrow-up-line"></i>
                        </button>
                    </div>
                    <div class="chat-disclaimer">
                        Farmer AI can make mistakes about farming techniques. Verify important information.
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!--=============== SCRIPTS ===============-->
    <script src="assets/js/main.js"></script>
    <script src="assets/js/chatbot.js"></script>
</body>
</html>
